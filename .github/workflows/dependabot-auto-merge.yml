name: Dependabot Auto-Merge

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

on:
  pull_request:
    types: [opened, synchronize, reopened]
  check_suite:
    types: [completed]

jobs:
  auto-merge:
    name: Auto-merge Dependabot PR
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'pull_request' && github.actor == 'dependabot[bot]') ||
      (github.event_name == 'check_suite' && github.event.check_suite.app.slug == 'dependabot')
    steps:
      - name: Check PR mergeability
        id: check
        run: |
          echo "Checking PR status..."

          # Resolve PR number for both event types
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            PR_NUMBER=${{ github.event.pull_request.number }}
          else
            COMMIT_SHA=${{ github.event.check_suite.head_sha }}
            PR_NUMBER=$(gh api repos/${{ github.repository }}/commits/$COMMIT_SHA/pulls -q '.[0].number')
          fi

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" == "null" ]; then
            echo "can_merge=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "PR Number: $PR_NUMBER"

          # Check if PR is mergeable
          MERGEABLE=$(gh pr view $PR_NUMBER --json mergeable -q '.mergeable')
          MERGE_STATE=$(gh pr view $PR_NUMBER --json mergeableState -q '.mergeableState')
          echo "can_merge=$MERGEABLE" >> "$GITHUB_OUTPUT"
          echo "merge_state=$MERGE_STATE" >> "$GITHUB_OUTPUT"

      - name: Merge PR
        if: success() && steps.check.outputs.can_merge == 'true'
        run: |
          PR_NUMBER=${{ steps.check.outputs.pr_number }}
          echo "Merging PR #$PR_NUMBER..."
          gh pr merge --merge --delete-branch $PR_NUMBER
        env:
          GH_TOKEN: ${{ github.token }}