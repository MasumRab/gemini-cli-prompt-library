name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]
  check_suite:
    types: [completed]

jobs:
  auto-merge:
    name: Auto-merge Dependabot PR
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Check PR mergeability
        id: check
        run: |
          echo "Checking PR status..."
          
          # Get PR details
          PR_NUMBER=${{ github.event.pull_request.number }}
          echo "PR Number: $PR_NUMBER"
          
          # Check if PR is mergeable
          MERGEABLE=$(gh pr view $PR_NUMBER --json mergeable -q '.mergeable')
          MERGE_STATE=$(gh pr view $PR_NUMBER --json mergeableState -q '.mergeableState')
          echo "Mergeable: $MERGEABLE"
          echo "Merge State: $MERGE_STATE"
          
          # Check if all required checks have passed using checks API
          COMMIT_SHA=$(gh pr view $PR_NUMBER --json headRefOid -q '.headRefOid')
          
          # Get the combined status
          COMBINED_STATUS=$(gh api repos/${{ github.repository }}/commits/$COMMIT_SHA/status -q '.state')
          echo "Combined status: $COMBINED_STATUS"
          
          # Also check if there are any failed checks
          CHECKS=$(gh api repos/${{ github.repository }}/commits/$COMMIT_SHA/check-runs -q '.check_runs[] | select(.conclusion == "failure") | .name')
          
          # Only merge if PR is mergeable and all checks passed
          if [ "$MERGEABLE" == "true" ] && [ "$COMBINED_STATUS" == "success" ] && [ -z "$CHECKS" ]; then
            echo "can_merge=true" >> $GITHUB_OUTPUT
            echo "All checks passed, PR is ready to merge"
          else
            echo "can_merge=false" >> $GITHUB_OUTPUT
            echo "PR is not ready to merge yet. Mergeable: $MERGEABLE, Status: $COMBINED_STATUS"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge PR
        if: steps.check.outputs.can_merge == 'true'
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          echo "Merging PR #$PR_NUMBER..."
          gh pr merge --merge --delete-branch $PR_NUMBER
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}