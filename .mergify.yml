pull_request_rules:
  - name: Automatic merge when CI passes
    description: Merge when PR passes all branch protection checks
    conditions:
      - or:
          - and:
              - check-success = SonarCloud Code Analysis
              - check-success = CodeQL
              - check-success = lint
          - label = hotfix
    actions:
      merge:
  - name: Make sure PRs are up to date before merging with rebase
    description: This automatically rebases PRs when they are out-of-date with the
      base branch to avoid semantic conflicts (next step is to switch to merge
      queue).
    conditions:
      - "#commits-behind >= 10"
    actions:
      rebase:
  - name: Ping PR author when conflicting
    description: Warn the pull request author when their PR has conflicts
    conditions:
      - conflict
      - -closed
    actions:
      comment:
        message: >
          👋 {{author}} your PR is conflicting and needs to be updated to be
          merged
